spring.application.name=ishyallm

# R2DBC - 默认连接本地 PG
spring.r2dbc.url=r2dbc:postgresql://localhost:5432/ishyallm
spring.r2dbc.username=postgres
spring.r2dbc.password=114514

# JDBC DataSource（用于 PGVector、对话历史等原生 SQL 查询）
spring.datasource.url=jdbc:postgresql://localhost:5432/ishyallm
spring.datasource.username=postgres
spring.datasource.password=114514
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-test-query=SELECT 1

# 启动时自动执行 schema.sql
spring.r2dbc.init.mode=always

# JWT
ishyallm.jwt.secret=ishyallm-default-secret-key-change-in-production-32char
ishyallm.jwt.expiry-seconds=86400

# Actuator
management.endpoints.web.exposure.include=health,info

langchain4j.open-ai.chat-model.api-key=sk-b4e595595a89402e92797b3c09c4d3a8
langchain4j.open-ai.chat-model.base-url=https://api.deepseek.com
langchain4j.open-ai.chat-model.model-name=deepseek-v4-flash

langchain4j.community.dashscope.embedding-model.api-key=sk-7bff9aa4757448e390a8b5175f2fda2f
langchain4j.community.dashscope.embedding-model.model-name=text-embedding-v4

ishyallm.model.flash.api-key=sk-b4e595595a89402e92797b3c09c4d3a8
ishyallm.model.flash.base-url=https://api.deepseek.com
ishyallm.model.flash.model-name=deepseek-v4-flash
ishyallm.model.flash.max-tokens=1024

# Pro 模型（复杂推理）
ishyallm.model.pro.api-key=sk-b4e595595a89402e92797b3c09c4d3a8
ishyallm.model.pro.base-url=https://api.deepseek.com
ishyallm.model.pro.model-name=deepseek-v4-pro
ishyallm.model.pro.max-tokens=1024

# === Kafka 管线（文档摄入）===
spring.kafka.bootstrap-servers=localhost:9092
ishyallm.kafka.enabled=true
ishyallm.ingestion.consumer.enabled=true
ishyallm.ingestion.embed-consumer.enabled=true

# === PGVector 检索 ===
ishyallm.pgvector.enabled=true

# === ES 全文检索（可选）===
ishyallm.es.enabled=true